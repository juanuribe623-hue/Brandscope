<body>
  <div id="root"></div>
  <script>
    let ANTHROPIC_KEY = localStorage.getItem('bs_apikey') || '';
    window.ANTHROPIC_KEY = ANTHROPIC_KEY;
  </script>
  <script>
    const T="#2a7a8c",TL="#3a9ab0",G="#c9a84c",INK="#0a0d12",CR="#f7f4ef",MU="#6b7280";
const BO="rgba(42,122,140,0.18)",GR="#4ade80",AM="#fbbf24",RE="#f87171";
const sc=s=>s>=75?GR:s>=50?AM:RE;
const SK="bs_v11";
const W={engagement_real:20,calidad_audiencia:20,afinidad_marca:25,tono_estetica:10,ubicacion_audiencia:15,riesgo_competidor:10};
const DL={engagement_real:"Engagement Real",calidad_audiencia:"Calidad Audiencia",afinidad_marca:"Afinidad Marca",tono_estetica:"Tono & Estética",ubicacion_audiencia:"Ubicación Audiencia",riesgo_competidor:"Riesgo Competidor"};
const calcS=d=>!d?0:Math.round(Object.entries(W).reduce((a,[k,w])=>{const v=d[k];const s=typeof v==="object"?Number(v?.score):Number(v);return a+(isNaN(s)?0:s)*(w/100);},0));
const getV=s=>s>=70?"APROBADO":s>=50?"APROBADO CON RESERVAS":"RECHAZADO";
const lH=()=>{try{return JSON.parse(localStorage.getItem(SK))||[];}catch{return[];}};
const sH=h=>{try{localStorage.setItem(SK,JSON.stringify(h));}catch{}};
const IND=["Tecnología","Retail & E-commerce","Alimentos & Bebidas","Belleza & Cuidado Personal","Moda & Estilo","Deportes & Fitness","Turismo & Hospitality","Salud & Pharma","Finanzas & Seguros","Otro"];
const OBJ=["Awareness (conocimiento de marca)","Consideración (engagement)","Conversión (ventas directas)","Lanzamiento de producto","UGC (contenido para reusar)"];
const CC={background:"rgba(255,255,255,.03)",border:"1px solid "+BO,borderRadius:16,padding:20,marginBottom:12};
const pc=s=>s>=75?"#16a34a":s>=50?"#b45309":"#dc2626";
const pv=v=>v==="APROBADO"?"✓ APROBADO":v==="APROBADO CON RESERVAS"?"⚡ RESERVAS":"✗ RECHAZADO";
const gs=(r,k)=>{const v=r.dimensiones?.[k];return typeof v==="object"?Number(v?.score)||0:Number(v)||0;};

const SEARCH_TOOL=[{type:"web_search_20250305",name:"web_search"}];
async function api(msg,tok=400,retries=3,useSearch=false){
  for(let i=0;i<retries;i++){
    const body={model:"claude-sonnet-4-20250514",max_tokens:tok,messages:[{role:"user",content:msg}]};
    if(useSearch)body.tools=SEARCH_TOOL;
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(r.status===429){
      if(i<retries-1){await new Promise(res=>setTimeout(res,3000*(i+1)));continue;}
    }
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    return(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join(" ")||"";
  }
  throw new Error("Rate limit — intenta en unos segundos");
}
async function verificar(h,p,log){
  log("Buscando "+h+"...");
  const handle=h.startsWith("@")?h:"@"+h;
  const q="Busca en internet quién es el influencer "+handle+" de "+p+". "
    +"Intenta con estas búsquedas: '"+handle+" influencer', '"+handle+" "+p+"', '"+handle+" Colombia', '"+handle+" LATAM'. "
    +"Responde SOLO con JSON válido:\n"
    +"Si encontraste datos reales: {\"conocido\":true,\"nicho\":\"nicho real\",\"seguidores\":\"número real\",\"resumen_perfil\":\"quién es con datos reales\"}\n"
    +"Si no encontraste nada concreto: {\"conocido\":false,\"opciones\":[\"posibilidad 1\",\"posibilidad 2\"],\"pregunta\":\"pregunta corta al usuario\"}";
  const raw=await api(q,500,3,true);
  const s=raw.indexOf("{"),e=raw.lastIndexOf("}");
  if(s===-1)return {conocido:true};
  try{return JSON.parse(raw.slice(s,e+1));}catch{return {conocido:true};}
}

async function evaluar(h,p,marca,ind,obj,extra,ctx,log){
  log("Evaluando "+h+"...");
  const ctxStr=ctx?" Contexto adicional del usuario: "+ctx:"";
  const handle=h.startsWith("@")?h:"@"+h;
  const q="Eres un experto en influencer marketing LATAM con acceso a búsqueda web.\n\n"
    +"TAREA: Evalúa al influencer "+handle+" de "+p+" para una campaña de "+marca+" ("+ind+", "+obj+").\n"
    +(extra?"Contexto de campaña: "+extra+"\n":"")
    +ctxStr+"\n\n"
    +"INSTRUCCIONES DE BÚSQUEDA:\n"
    +"1. Busca '"+handle+" "+p+"' en Google para encontrar artículos, entrevistas o menciones\n"
    +"2. Busca '"+handle+" influencer Colombia' o '"+handle+" influencer LATAM' si no hay resultados\n"
    +"3. Busca '"+handle+" "+marca+"' o '"+handle+" "+ind+"' para ver colaboraciones\n"
    +"4. Usa CUALQUIER fuente secundaria: blogs, medios, directorios de influencers, LinkedIn, YouTube, etc.\n"
    +"5. Si "+p+" es Instagram, busca también en TikTok, YouTube o Twitter del mismo creador\n\n"
    +"REGLAS PARA LOS SCORES (enteros 1-100, NUNCA 0):\n"
    +"- Si encontraste datos reales: scores precisos basados en hechos\n"
    +"- Si encontraste datos parciales: scores estimados con comentario honesto\n"
    +"- Si no encontraste nada: scores conservadores 25-45 con alerta de 'perfil no verificado'\n\n"
    +"Responde SOLO con este JSON (sin markdown, sin texto extra):\n"
    +"{\"handle\":\""+h+"\",\"plataforma\":\""+p+"\",\"marca\":\""+marca+"\","
    +"\"seguidores\":\"número real o estimado\",\"engagement\":\"% real o estimado\","
    +"\"nicho\":\"nicho principal\","
    +"\"datos_encontrados\":\"qué fuentes encontraste y qué datos obtuviste\","
    +"\"colaboraciones_detectadas\":[\"marca1\",\"marca2\"],"
    +"\"resumen\":\"2-3 oraciones con datos reales encontrados o estimación honesta\","
    +"\"dimensiones\":{"
    +"\"engagement_real\":{\"score\":55,\"comentario\":\"análisis con datos reales o estimación\"},"
    +"\"calidad_audiencia\":{\"score\":55,\"comentario\":\"análisis\"},"
    +"\"afinidad_marca\":{\"score\":55,\"comentario\":\"análisis\"},"
    +"\"tono_estetica\":{\"score\":55,\"comentario\":\"análisis\"},"
    +"\"ubicacion_audiencia\":{\"score\":55,\"comentario\":\"análisis\"},"
    +"\"riesgo_competidor\":{\"score\":55,\"comentario\":\"análisis\"}},"
    +"\"fortalezas\":[\"fortaleza real 1\",\"fortaleza real 2\",\"fortaleza real 3\"],"
    +"\"alertas\":[\"alerta o limitación importante\"],"
    +"\"recomendacion\":\"3-5 oraciones tácticas concretas para "+marca+"\"}";
  const raw=await api(q,2000,3,true);
  const s=raw.indexOf("{"),e=raw.lastIndexOf("}");
  if(s===-1)throw new Error("Sin JSON — reintenta");
  const res=JSON.parse(raw.slice(s,e+1));
  Object.keys(W).forEach(k=>{
    if(!res.dimensiones)res.dimensiones={};
    const v=res.dimensiones[k];
    const n=typeof v==="object"?Number(v?.score):Number(v);
    if(typeof res.dimensiones[k]!=="object")res.dimensiones[k]={score:40,comentario:"Sin datos suficientes"};
    if(isNaN(n)||n<=0||n>100)res.dimensiones[k].score=40;
    else res.dimensiones[k].score=Math.round(n);
  });
  res.brandfit_score=calcS(res.dimensiones);
  res.veredicto=getV(res.brandfit_score);
  log(h+": "+res.brandfit_score+" → "+res.veredicto+" ✓");
  return res;
}


    function openPDF(r1,marca,r2){
  const isC=!!r2,now=new Date().toLocaleDateString("es-CO",{day:"2-digit",month:"long",year:"numeric"});
  const card=r=>"<div class='nb' style='border:1px solid #d4eaf0;border-radius:8px;padding:14px;margin-bottom:12px;background:#fafcfd'>"
    +"<div style='display:flex;gap:12px;margin-bottom:10px'>"
    +"<div style='width:50px;height:50px;border-radius:50%;border:4px solid "+pc(r.brandfit_score)+";display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0'>"
    +"<b style='font-size:15px;color:"+pc(r.brandfit_score)+"'>"+r.brandfit_score+"</b><span style='font-size:6px;color:#888'>SCORE</span></div>"
    +"<div><span style='border:1px solid "+pc(r.brandfit_score)+";color:"+pc(r.brandfit_score)+";padding:2px 8px;border-radius:100px;font-size:8px;font-weight:700'>"+pv(r.veredicto)+"</span>"
    +"<div style='font-size:13px;font-weight:900;margin:4px 0 2px'>"+r.handle+" · "+(r.plataforma||"")+"</div>"
    +"<div style='font-size:9px;color:#666'>"
    +[r.seguidores?"👥 "+r.seguidores:"",r.engagement?"💬 "+r.engagement+"%":"",r.nicho?"🎯 "+r.nicho:""].filter(Boolean).join(" · ")+"</div>"
    +"<div style='font-size:11px;color:#333;line-height:1.5;margin-top:4px'>"+(r.resumen||"")+"</div></div></div>"
    +(r.datos_encontrados?"<div style='background:#f0f8fa;border:1px solid #c5e3ea;padding:4px 8px;border-radius:4px;font-size:9px;color:#2a7a8c;margin-bottom:8px'>🔍 "+r.datos_encontrados+"</div>":"")
    +"<table style='width:100%;border-collapse:collapse;margin-bottom:10px'><thead><tr style='background:#e8f4f8'>"
    +"<th style='padding:4px 8px;font-size:9px;text-align:left;color:#2a7a8c'>Dimensión</th>"
    +"<th style='padding:4px 8px;font-size:9px;color:#2a7a8c'>Score</th>"
    +"<th style='padding:4px 8px;font-size:9px;text-align:left;color:#2a7a8c'>Comentario</th></tr></thead><tbody>"
    +Object.keys(W).map(k=>{const s=gs(r,k);const cm=typeof r.dimensiones[k]==="object"?r.dimensiones[k]?.comentario:"";
      return "<tr><td style='padding:4px 8px;font-size:10px;color:#555'>"+DL[k]+" ("+W[k]+"%)</td>"
        +"<td style='padding:4px 8px;font-size:11px;font-weight:700;color:"+pc(s)+"'>"+s+"/100</td>"
        +"<td style='padding:4px 8px;font-size:10px;color:#666'>"+cm+"</td></tr>";}).join("")+"</tbody></table>"
    +"<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px'>"
    +"<div style='border:1px solid #d4eaf0;border-radius:6px;padding:9px'><b style='font-size:9px;color:#16a34a;display:block;margin-bottom:5px'>✓ FORTALEZAS</b>"
    +(r.fortalezas||[]).map(f=>"<div style='font-size:10px;margin-bottom:3px'>✓ "+f+"</div>").join("")+"</div>"
    +"<div style='border:1px solid #d4eaf0;border-radius:6px;padding:9px'><b style='font-size:9px;color:#b45309;display:block;margin-bottom:5px'>⚠ ALERTAS</b>"
    +(r.alertas?.filter(Boolean).length?r.alertas.filter(Boolean).map(a=>"<div style='font-size:10px;margin-bottom:3px'>⚠ "+a+"</div>").join(""):"<span style='font-size:10px;color:#888'>Sin alertas</span>")+"</div></div>"
    +"<div style='background:#f7fbf5;border:1px solid #b8dfc5;border-radius:6px;padding:10px'>"
    +"<b style='font-size:9px;color:#2a7a8c;display:block;margin-bottom:5px'>⚡ RECOMENDACIÓN — "+marca+"</b>"
    +"<div style='font-size:11px;color:#222;line-height:1.55'>"+(r.recomendacion||"")+"</div></div></div>";
  const items=isC?[r1,r2]:[r1];
  const ttl=isC?r1.handle+" vs "+r2.handle:"Evaluación: "+r1.handle;
  const win2=isC?"<div style='background:#e8f4f8;border:1px solid #9fd3e0;border-radius:7px;padding:9px 12px;margin-bottom:10px;font-size:11px'>🏆 <b>"+(r1.brandfit_score>=r2.brandfit_score?r1:r2).handle+"</b> — mejor BrandFit, "+Math.abs(r1.brandfit_score-r2.brandfit_score)+" pts para "+marca+"</div>":"";
  const cmp2=isC?"<table style='width:100%;border-collapse:collapse;margin-bottom:12px'><thead><tr style='background:#e8f4f8'><th style='padding:5px 9px;font-size:9px;text-align:left;color:#2a7a8c'>Dimensión</th><th style='padding:5px 9px;font-size:9px;color:#2a7a8c'>"+r1.handle+"</th><th style='padding:5px 9px;font-size:9px;color:#2a7a8c'>"+r2.handle
    +"</th></tr></thead><tbody><tr><td style='padding:5px;font-size:10px'>BrandFit Score</td><td style='padding:5px;font-size:13px;font-weight:900;color:"+pc(r1.brandfit_score)
    +"'>"+r1.brandfit_score+"</td><td style='padding:5px;font-size:13px;font-weight:900;color:"+pc(r2.brandfit_score)+"'>"+r2.brandfit_score+"</td></tr>"+Object.keys(W).map(k=>{const s0=gs(r1,k),s1=gs(r2,k);return "<tr><td style='padding:4px;font-size:10px;color:#555'>"+DL[k]+" ("+W[k]+"%)</td><td style='padding:4px;font-weight:"+(s0>s1?700:400)+";color:"+pc(s0)+"'>"+s0+"</td><td style='padding:4px;font-weight:"+(s1>s0?700:400)+";color:"+pc(s1)+"'>"+s1
    +"</td></tr>";}).join("")+"</tbody></table>":"";
  const body2=isC?items.map((r,i)=>"<div style='background:#edf6f9;border:1px solid #c5e3ea;border-radius:5px;padding:5px 10px;margin-bottom:8px'><small style='font-size:9px;text-transform:uppercase;color:#2a7a8c'>Influencer "+(i===0?"A":"B")+"</small> <b>"+r.handle+"</b></div>"+card(r)+(i===0?"<div style='page-break-before:always;break-before:always;height:0;display:block'></div>":"")).join(""):card(r1);
  const html="<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><title>BrandScope</title>"
    +"<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;background:#fff;color:#1a1a2e}@page{margin:.7cm}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style>"
    +"</head><body><div style='max-width:720px;margin:0 auto;padding:20px'>"
    +"<div style='background:linear-gradient(135deg,#2a7a8c,#1a4a5c);margin:-20px -20px 16px;padding:13px 20px;display:flex;justify-content:space-between;align-items:center'>"
    +"<div style='font-size:16px;font-weight:900;color:#fff'>Brand<em style='color:#7ecfdf;font-style:italic'>Scope</em><small style='font-size:8px;opacity:.6;font-family:monospace;display:block'>by CollabStudio</small></div>"
    +"<div style='text-align:right;font-size:9px;color:rgba(255,255,255,.65);font-family:monospace;line-height:1.5'><div>"+(isC?"Comparativo":"Evaluación")+"</div><div>"+now+"</div></div></div>"
    +"<div style='margin-bottom:10px;padding-bottom:9px;border-bottom:2px solid #e8f4f8'><h1 style='font-size:17px;font-weight:900'><em style='color:#2a7a8c;font-style:italic'>"+ttl+"</em></h1>"
    +"<div style='font-size:10px;color:#666;font-family:monospace'>Campaña: "+marca+" · "+new Date().getFullYear()+"</div></div>"
    +"<div style='margin-bottom:9px;background:#f0f8fa;border:1px solid #c5e3ea;border-radius:5px;padding:5px 10px;font-size:9px;font-family:monospace;color:#2a7a8c'>Pesos: Afinidad 25% · Engagement 20% · Audiencia 20% · Ubicación 15% · Tono 10% · Riesgo 10%</div>"
    +win2+cmp2+body2
    +"<div style='margin-top:14px;padding-top:7px;border-top:1px solid #dde;display:flex;justify-content:space-between;font-size:9px;color:#888;font-family:monospace'>"
    +"<span>BrandScope by CollabStudio♥ · collabinfluencer.com.co</span><span>"+now+"</span></div></div></body></html>";
  return html;
}

  <script type="text/babel" data-presets="react" data-type="script">
    const {useState,useEffect,useRef,useCallback}=React;
    
function PdfModal({html,onClose}){
  const aRef=React.useRef(null);
  React.useEffect(()=>{
    if(!aRef.current)return;
    const blob=new Blob([html],{type:"text/html;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    aRef.current.href=url;
    return()=>URL.revokeObjectURL(url);
  },[html]);
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.95)",zIndex:1000,display:"flex",flexDirection:"column"}}>
    <div style={{background:INK,padding:"11px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+BO,flexShrink:0}}>
      <span style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:900}}>Brand<em style={{fontStyle:"italic",color:TL}}>Scope</em> <span style={{fontSize:11,color:MU}}> \u2014 Informe</span></span>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <a ref={aRef} download="informe-brandscope.html" style={{padding:"6px 14px",background:"linear-gradient(135deg,"+T+","+TL+")",borderRadius:7,color:CR,fontSize:12,fontWeight:700,cursor:"pointer",textDecoration:"none",display:"inline-block"}}>\u2b07\ufe0f Descargar informe.html</a>
        <span style={{fontSize:11,color:MU}}>\u2192 \u00c1brelo en Chrome \u2192 Ctrl+P \u2192 PDF</span>
        <button onClick={onClose} style={{padding:"5px 13px",background:"transparent",border:"1px solid "+BO,borderRadius:7,color:MU,fontSize:12,cursor:"pointer"}}>\u2715 Cerrar</button>
      </div>
    </div>
    <iframe srcDoc={html} style={{flex:1,border:"none",background:"#fff"}} title="Informe BrandScope"/>
  </div>;
}

function Circle({score}){
  const sz=76,r=sz*.38,c=2*Math.PI*r,off=c-(score/100)*c,col=sc(score);
  return <div style={{position:"relative",width:sz,height:sz,flexShrink:0}}>
    <svg width={sz} height={sz} viewBox={"0 0 "+sz+" "+sz} style={{transform:"rotate(-90deg)",position:"absolute"}}>
      <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth={sz*.09}/>
      <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth={sz*.09} strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"/>
    </svg>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <span style={{fontFamily:"Georgia,serif",fontSize:21,fontWeight:900,color:col,lineHeight:1}}>{score}</span>
      <span style={{fontSize:7,color:MU,textTransform:"uppercase",letterSpacing:1,marginTop:2}}>Score</span>
    </div>
  </div>;
}
function Badge({v}){
  const m=v==="APROBADO"?[GR,"rgba(74,222,128,.15)","rgba(74,222,128,.3)","\u2713"]:v==="APROBADO CON RESERVAS"?[AM,"rgba(251,191,36,.15)","rgba(251,191,36,.3)","\u26a1"]:[RE,"rgba(248,113,113,.15)","rgba(248,113,113,.3)","\u2717"];
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 12px",borderRadius:100,fontSize:11,fontWeight:700,color:m[0],background:m[1],border:"1px solid "+m[2],fontFamily:"monospace"}}>{m[3]} {v}</span>;
}
function Dims({dimensiones}){
  return <>{Object.entries(dimensiones||{}).map(([k,v])=>{
    const s=typeof v==="object"?Number(v?.score)||0:Number(v)||0,cm=typeof v==="object"?v?.comentario:"";
    return <div key={k} style={{marginBottom:11}}>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2}}>
        <span style={{width:130,fontSize:11,fontFamily:"monospace",color:MU,flexShrink:0}}>{DL[k]}</span>
        <span style={{fontSize:9,color:TL,fontFamily:"monospace",width:24,flexShrink:0}}>{W[k]}%</span>
        <div style={{flex:1,height:4,background:"rgba(255,255,255,.06)",borderRadius:100,overflow:"hidden"}}>
          <div style={{width:s+"%",height:"100%",background:sc(s),borderRadius:100}}/>
        </div>
        <span style={{width:24,fontSize:11,fontFamily:"monospace",color:sc(s),textAlign:"right"}}>{s}</span>
      </div>
      <div style={{paddingLeft:161,fontSize:12,color:"rgba(247,244,239,.45)",lineHeight:1.45}}>{cm}</div>
    </div>;})}
  </>;
}
function ResultCard({r,marca,label,lc}){
  return <div style={{background:INK,display:"flex",flexDirection:"column",gap:12}}>
    {label&&<div style={{fontSize:10,fontFamily:"monospace",color:lc||TL,textTransform:"uppercase",letterSpacing:1.5,background:lc?"rgba(201,168,76,.1)":"rgba(42,122,140,.1)",border:"1px solid "+(lc||BO),padding:"3px 10px",borderRadius:6,alignSelf:"flex-start"}}>{label}</div>}
    <div style={CC}>
      <div style={{display:"flex",gap:16,alignItems:"flex-start",marginBottom:12}}>
        <Circle score={r.brandfit_score}/>
        <div style={{flex:1}}>
          <Badge v={r.veredicto}/>
          <div style={{fontFamily:"Georgia,serif",fontSize:17,fontWeight:900,color:CR,margin:"6px 0 3px"}}>{r.handle}</div>
          <div style={{fontSize:11,color:MU,marginBottom:7}}>
            {r.plataforma&&<span style={{marginRight:8}}>\u1f4f1 {r.plataforma}</span>}
            {r.seguidores&&<span style={{marginRight:8}}>\u1f465 {r.seguidores}</span>}
            {r.engagement&&<span style={{marginRight:8}}>\u1f4ac {r.engagement}%</span>}

          <div style={{fontSize:9,color:MU,fontFamily:"monospace",letterSpacing:1.2,marginTop:1}}>by CollabStudio\u2665 \u00b7 Evaluador de Influencers</div>

        <div style={{display:"flex",gap:7}}>
          <button onClick={()=>setShowLog(!showLog)} style={{background:"transparent",border:"1px solid "+(showLog?T:BO),color:showLog?TL:MU,fontSize:11,padding:"4px 11px",borderRadius:7,cursor:"pointer",fontFamily:"monospace"}}>{showLog?"\u25bc Log":"\u25b6 Log"}</button>
          <button onClick={()=>setTab(tab==="eval"?"hist":"eval")} style={{background:"transparent",border:"1px solid "+BO,color:MU,fontSize:12,padding:"5px 14px",borderRadius:9,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
            {tab==="eval"?<>\u1f4cb Historial <span style={{background:T,color:"white",borderRadius:100,padding:"1px 6px",fontSize:10,fontWeight:700}}>{hist.length}</span></>:"\u2190 Evaluador"}
          </button>
        </div>
      </div>
      {showLog&&<div style={{background:"rgba(0,0,0,.4)",border:"1px solid "+BO,borderRadius:10,padding:12,marginBottom:16,maxHeight:150,overflowY:"auto"}}>
        <div style={{fontSize:9,fontFamily:"monospace",color:TL,letterSpacing:1.5,textTransform:"uppercase",marginBottom:7,display:"flex",justifyContent:"space-between"}}>
          <span>\u1f4cb Log</span><button onClick={()=>setLogs([])} style={{background:"transparent",border:"none",color:MU,fontSize:10,cursor:"pointer"}}>Limpiar</button>
        </div>
        {logs.length===0?<div style={{fontSize:11,color:MU,fontFamily:"monospace"}}>Sin actividad.</div>:logs.map((l,i)=><div key={i} style={{fontSize:10,fontFamily:"monospace",color:l.includes("ERROR")?RE:l.includes("\u2713")?GR:MU,marginBottom:2}}>{l}</div>)}
      </div>}
      {tab==="eval"&&<>
        {!res&&!loading&&!clarif&&<div style={{textAlign:"center",marginBottom:20}}>
          <h1 style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:900,lineHeight:1.2,marginBottom:6}}>Ingresa el <em style={{color:TL}}>@handle</em><br/>y BrandScope eval\u00faa al instante</h1>
          <p style={{fontSize:12,color:MU}}>Score con pesos fijos \u00b7 IA \u00b7 Comparaci\u00f3n \u00b7 PDF</p>
        </div>}
        {!res&&!clarif&&<EvalForm mode={mode} setMode={setMode} hA={hA} setHA={setHA} hB={hB} setHB={setHB} pA={pA} setPA={setPA} pB={pB} setPB={setPB} marca={marca} setMarca={setMarca} ind={ind} setInd={setInd} obj={obj} setObj={setObj} extra={extra} setExtra={setExtra} err={err} run={run}/>}
        {loading&&<div style={{...CC,padding:46,textAlign:"center"}}>
          <div style={{fontSize:44,marginBottom:13}}>{["\u1f50d","\u1f4ca","\u1f91d","\u1f3af","\u26a1"][step]}</div>
          <div style={{fontFamily:"monospace",fontSize:13,color:TL,marginBottom:4}}>{ST[step]}</div>
          <div style={{fontSize:11,color:MU,marginBottom:24}}>{mode==="compare"?"Procesando dos perfiles...":"Procesando perfil..."}</div>
          <div style={{display:"flex",justifyContent:"center",gap:5}}>{[0,1,2,3,4].map(i=><div key={i} style={{width:i===step?22:6,height:3,borderRadius:100,background:i===step?TL:"rgba(255,255,255,.1)",transition:"all .3s"}}/>)}</div>
        </div>}
        {clarif&&!loading&&<Clarif clarif={clarif} hA={hA} hB={hB} mode={mode} ctxA={ctxA} setCtxA={setCtxA} ctxB={ctxB} setCtxB={setCtxB} onOk={()=>finalizar(ctxA,ctxB)} onBack={()=>setClarif(null)}/>}
        {res&&!loading&&<Results res={res} marca={marca} onPdf={()=>setPdfHtml(openPDF(res.a,marca,res.b||null))} onReset={()=>{setRes(null);setHA("");setHB("");setExtra("");setErr("");setClarif(null);}}/>}
      </>}
      {tab==="hist"&&<Historial hist={hist} onSelect={h=>{setRes({mode:h.mode,a:h.a,b:h.b});setMarca(h.marca);setTab("eval");}} onClear={()=>{setHist([]);sH([]);}}/>}
    </div>
    <style>{"input:focus,select:focus{border-color:"+T+"!important;outline:none}select option{background:#1a2330;color:"+CR+"}"}</style>
  </div>;
}

    console.log('2. React:', typeof React);
    console.log('3. ReactDOM:', typeof ReactDOM);
    console.log('4. root div:', document.getElementById('root'));
    console.log('5. useState:', typeof useState);
    console.log('6. App:', typeof App);
    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      console.log('7. createRoot OK');
      root.render(<App/>);
      console.log('8. render called');
    } catch(e) {
      console.error('RENDER ERROR:', e.message, e.stack);
      document.getElementById('root').innerHTML = '<div style="color:red;padding:20px;font-family:monospace;background:#1a0000;min-height:100vh"><h2>Error:</h2><pre>'+e.message+'</pre><pre>'+e.stack+'</pre></div>';
    }
  </script>
</body>
</html>
